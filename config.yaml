input_root: "D:/work/2026_workspace/Legal_DB/법무DB(테스트)"
scan_recursive: true
supported_extensions:
  - ".pdf"
  - ".docx"
  - ".doc"
  - ".pptx"
  - ".ppt"
  - ".xlsx"
  - ".xls"
  - ".jpg"
  - ".jpeg"
  - ".tif"
  - ".tiff"
  - ".eml"
  - ".hwp"
  - ".hwpx"
exclude_extensions:
  - ".png"
  - ".html"
llm:
  provider: "gemini"
  enabled: true
  temperature: 0.1
  timeout_seconds: 90
  gemini:
    model: "gemini-2.5-flash-lite"
    base_url: "https://generativelanguage.googleapis.com/v1beta"
    api_key: ""   # 비우면 .env의 GEMINI_API_KEY (또는 GOOGLE_API_KEY) 사용
ocr:
  enabled: true
  # OCR 엔진 선택: "accelerated" = Intel OpenVINO/RapidOCR(Arc GPU/NPU) 우선 → 실패 시 Tesseract 폴백
  #               "tesseract"   = 기존 Tesseract 파이프라인만 사용
  engine: "accelerated"
  language: "kor+eng"
  skip_text: true
  force_ocr_threshold_chars: 80
  keyword_confidence_threshold: 75.0
  timeout_seconds: 180
  # Intel Ultra 7 155H 가속 백엔드 설정
  accelerated:
    device_priority: ["GPU", "NPU", "CPU"]   # Arc GPU 우선 → NPU → CPU, 실패 시 다음으로 폴백
    lang: "korean"        # RapidOCR 인식 언어(한국어+영문)
    dpi: 300
    min_len: 40
    preprocess: false     # RapidOCR는 자체 전처리 포함 (true면 ocr_advanced 전처리 적용)
    timeout_seconds: 60
  advanced:
    enabled: true
    dpi: 300
    language: "kor+eng"
    min_len: 40
    fallback_to_ocrmypdf: true
    tesseract_cmd: "C:/Program Files/Tesseract-OCR/tesseract.exe"
    timeout_seconds: 60   # 이 시간 초과 시 처리된 페이지까지만 사용 (0 = 무제한)
review:
  output_dir: "./output/review"
logs:
  output_dir: "./output/logs"
rollback:
  output_dir: "./output/rollback"
temp:
  dir: "./temp"
naming:
  org_name: "법무실"
  confidence_threshold: 0.78
  max_filename_length: 180
rename:
  execute_only_if_approved: true
  keep_folder_structure: true
  create_rollback_map: true
  path_length_limit: 240
sharepoint:
  # Set enabled: true and fill in credentials to use SharePoint mode.
  # Run: python src/main.py --mode analyze --source sharepoint
  enabled: false
  tenant_id: "b9501eff-d05e-4bf1-8a87-898d83f46ceb"
  client_id: "2093532b-df4b-4825-83a9-2c3666ec7db0"
  site_url: "https://poscointl1.sharepoint.com/sites/DX-DB"
  drive_name: "Documents"       # SharePoint document library display name
  root_folder: "법무DB (테스트)"  # Sub-folder inside the library (empty = library root)
  token_cache_path: "./temp/sp_token_cache.json"
  ssl_verify: false   # 회사 SSL 검사 프록시 환경에서는 false로 설정
  # drive_id: ""   # 선택사항: 테스트 실행 후 출력된 drive_id를 입력하면 Sites.Read.All 없이도 스캔 가능
  folder_sharing_url: "https://poscointl1.sharepoint.com/:f:/s/DX-DB/IgCQAQRjHIk0SbBnci9HWhCRAU_vHspdPVUezfWf_qfKBwI?e=wu11cv"
performance:
  workers: 6
  ocr_workers: 6
  llm_workers: 6
  progress_every: 10
  heartbeat_seconds: 30
  max_files: 0
  extract_max_chars: 15000
  llm_excerpt_chars: 5000
  fast_disables_ocr: true
  fast_disables_llm: true
